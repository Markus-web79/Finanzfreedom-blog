name: 🚀 Build and Deploy Blog

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 7 * * 1"
    - cron: "0 7 * * 3"
    - cron: "0 7 * * 5"

  workflow_dispatch:

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'Auto:')"
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v4

      - name: 🧩 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🧩 Install Dependencies
        run: npm install

      - name: 🧠 SEO Qualitätsprüfung
        run: |
          echo "📊 Prüfe Artikel auf SEO-Qualität..."
          node scripts/seoCheck.js || true

      - name: ✍️ Generiere Artikel
        run: |
          echo "📰 Generiere neuen Artikel..."
          node scripts/generateArticle.js

      - name: ⚖️ Generiere Vergleichsartikel
        run: |
          echo "⚖️ Generiere neuen Vergleichsartikel..."
          node scripts/generateComparison.js || true

      - name: 🔗 Interne Verlinkung
        run: |
          echo "🔗 Füge interne Links hinzu..."
          node scripts/linkInternal.js || true

      - name: 📰 RSS Feed generieren
        run: |
          echo "📡 Erstelle RSS-Feed..."
          node scripts/generateFeed.js || true

      - name: 🔔 Suchmaschinen anpingen
        run: |
          echo "🔔 Informiere Google & Bing..."
          node scripts/pingSearchEngines.js || true

      - name: 💾 Commit neue Inhalte
        run: |
          git config --global user.name "FinanzFreedom Bot"
          git config --global user.email "bot@finanzfreedom.de"
          git add content/
          git commit -m "🤖 Auto: Neue Inhalte generiert" || echo "Keine neuen Inhalte"
          git push

      - name: 🏗️ Build Next.js
        run: npm run build

      - name: 🚀 Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 💾 Backup generierter Inhalte
        run: |
          echo "💾 Erstelle Backup der Inhalte..."
          zip -r backup_$(date +%Y%m%d).zip content/
